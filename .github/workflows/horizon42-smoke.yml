# Horizon 42: egress URL allow-list (stdlib)
name: horizon42-smoke

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run Horizon 42 --verify
        run: python scripts/horizon42_egress_allow_smoke.py --verify
      - name: Check artifact
        run: |
          python -c "import json, pathlib; p=pathlib.Path('.tmp/horizon42-egress-allow/run.json'); d=json.loads(p.read_text()); assert d.get('ok') and d.get('horizon')==42; assert d['schema']=='horizon42_egress_allow_run/1.0'; print('ok')"
