name: Deploy versioned model artifact to Hugging Face

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g. 1, 2, 3)"
        required: true
        default: "1"
      namespace:
        description: "Hugging Face namespace (user or org)"
        required: true
        default: "HyperlinksSpace"
      source_model_id:
        description: "HF model repo to promote (trained on HF or uploaded from local), e.g. HyperlinksSpace/TinyModel1"
        required: true
        default: "HyperlinksSpace/TinyModel1"

jobs:
  deploy-model:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install --upgrade huggingface_hub

      - name: Build versioned model folder
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'PY'
          import os
          import shutil
          from pathlib import Path
          from huggingface_hub import snapshot_download

          version = "${{ github.event.inputs.version }}"
          if not version.isdigit() or int(version) < 1:
              raise SystemExit("Version must be a positive integer.")

          source_model_id = "${{ github.event.inputs.source_model_id }}".strip()
          if not source_model_id:
              raise SystemExit("source_model_id is required.")
          token = os.getenv("HF_TOKEN")
          if not token:
              raise SystemExit("Missing HF_TOKEN secret.")
          dst = Path(f".tmp/TinyModel{version}")
          if dst.exists():
              shutil.rmtree(dst)
          snapshot_download(
              repo_id=source_model_id,
              repo_type="model",
              token=token,
              local_dir=str(dst),
              ignore_patterns=["*.h5", "*.msgpack", "*.onnx_data"],
          )
          print(f"Prepared: {dst}")
          PY

      - name: Publish TinyModel{version}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python scripts/publish_hf_artifact.py \
            --namespace "${{ github.event.inputs.namespace }}" \
            --name "TinyModel${{ github.event.inputs.version }}" \
            --repo-type model \
            --source-dir ".tmp/TinyModel${{ github.event.inputs.version }}"
