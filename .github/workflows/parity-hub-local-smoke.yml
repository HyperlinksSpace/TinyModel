# Parity smoke: tiny local checkpoint vs Hub model JSON comparison.
name: parity-hub-local-smoke

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  parity:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Unit tests (stdlib, tests/)
        uses: ./.github/actions/stdlib-unittest

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch transformers datasets tokenizers

      - name: Train tiny local checkpoint
        run: |
          python scripts/train_tinymodel1_classifier.py \
            --output-dir .tmp/parity-smoke-local \
            --max-train-samples 64 \
            --max-eval-samples 32 \
            --epochs 1 \
            --batch-size 8 \
            --seed 42

      - name: Build Hub-vs-local parity report
        run: |
          python scripts/parity_check_hub_vs_local.py \
            --local-model .tmp/parity-smoke-local \
            --hub-model HyperlinksSpace/TinyModel1 \
            --output .tmp/parity-check/hub-vs-local.json

      - name: Check parity report schema
        run: |
          python -c "import json, pathlib; p=pathlib.Path('.tmp/parity-check/hub-vs-local.json'); d=json.loads(p.read_text()); assert d.get('schema')=='tinymodel_hub_local_parity/1.0'; s=d.get('summary',{}); assert s.get('n_queries',0)>=1; assert 0.0<=float(s.get('top_label_match_rate',0.0))<=1.0; print('ok')"

      - name: Upload parity report artifact
        uses: actions/upload-artifact@v4
        with:
          name: parity-hub-vs-local-report
          path: .tmp/parity-check/hub-vs-local.json
          if-no-files-found: error
