# Horizon 66: deprecated dependency ceiling (stdlib)
name: horizon66-smoke

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run Horizon 66 --verify
        run: python scripts/horizon66_deprecated_dep_smoke.py --verify
      - name: Check artifact
        run: |
          python -c "import json, pathlib; p=pathlib.Path('.tmp/horizon66-deprecated-dep/run.json'); d=json.loads(p.read_text()); assert d.get('ok') and d.get('horizon')==66; assert d['schema']=='horizon66_deprecated_dep_run/1.0'; print('ok')"
