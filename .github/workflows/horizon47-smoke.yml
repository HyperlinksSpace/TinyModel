# Horizon 47: kill switch global deny (stdlib)
name: horizon47-smoke

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run Horizon 47 --verify
        run: python scripts/horizon47_kill_switch_smoke.py --verify
      - name: Check artifact
        run: |
          python -c "import json, pathlib; p=pathlib.Path('.tmp/horizon47-kill-switch/run.json'); d=json.loads(p.read_text()); assert d.get('ok') and d.get('horizon')==47; assert d['schema']=='horizon47_kill_switch_run/1.0'; print('ok')"
