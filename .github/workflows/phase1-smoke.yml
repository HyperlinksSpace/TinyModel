name: Phase 1 smoke regression

on:
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Unit tests (eval_report_routing, stdlib)
        run: |
          python -m unittest discover -s tests -p "test_*.py" -v

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch transformers datasets tokenizers

      - name: Run smoke preset (scratch only)
        run: |
          python scripts/phase1_compare.py \
            --preset smoke \
            --models scratch \
            --datasets ag_news,emotion \
            --seed 42

      - name: Horizon 1 route-to-RAG glue (verify)
        run: |
          python scripts/horizon1_route_then_retrieve.py --verify \
            --model artifacts/phase1/runs/smoke/ag_news/scratch

      - name: Phase 2 routing JSON (routing_policy --from-checkpoint)
        run: |
          python scripts/routing_policy.py --from-checkpoint \
            artifacts/phase1/runs/smoke/ag_news/scratch

      - name: Verify comparison report exists
        run: |
          test -f artifacts/phase1/reports/phase1_smoke_seed42.md
          test -f artifacts/phase1/reports/phase1_smoke_seed42.json
