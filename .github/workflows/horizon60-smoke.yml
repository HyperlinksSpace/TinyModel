# Horizon 60: SPDX license allow-list (stdlib)
name: horizon60-smoke

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run Horizon 60 --verify
        run: python scripts/horizon60_license_allow_smoke.py --verify
      - name: Check artifact
        run: |
          python -c "import json, pathlib; p=pathlib.Path('.tmp/horizon60-license-allow/run.json'); d=json.loads(p.read_text()); assert d.get('ok') and d.get('horizon')==60; assert d['schema']=='horizon60_license_allow_run/1.0'; print('ok')"
