# Horizon 7: two SQLite “tenants”, no crosstalk (stdlib + horizon3_store)
name: horizon7-smoke

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Unit tests (stdlib, tests/)
        uses: ./.github/actions/stdlib-unittest
      - name: Run Horizon 7 --verify
        run: python scripts/horizon7_assured_smoke.py --verify
      - name: Check artifact
        run: |
          python -c "import json, pathlib; p=pathlib.Path('.tmp/horizon7-assured/run.json'); d=json.loads(p.read_text()); assert d.get('ok') and d.get('horizon')==7; assert d['schema']=='horizon7_assured_run/1.0'; print('ok')"
