# Horizon 69: vendor API host allow-list (stdlib)
name: horizon69-smoke

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run Horizon 69 --verify
        run: python scripts/horizon69_vendor_host_smoke.py --verify
      - name: Check artifact
        run: |
          python -c "import json, pathlib; p=pathlib.Path('.tmp/horizon69-vendor-host/run.json'); d=json.loads(p.read_text()); assert d.get('ok') and d.get('horizon')==69; assert d['schema']=='horizon69_vendor_host_run/1.0'; print('ok')"
