# Horizon 44: optimistic concurrency revision gate (stdlib)
name: horizon44-smoke

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run Horizon 44 --verify
        run: python scripts/horizon44_optimistic_lock_smoke.py --verify
      - name: Check artifact
        run: |
          python -c "import json, pathlib; p=pathlib.Path('.tmp/horizon44-optimistic-lock/run.json'); d=json.loads(p.read_text()); assert d.get('ok') and d.get('horizon')==44; assert d['schema']=='horizon44_optimistic_lock_run/1.0'; print('ok')"
