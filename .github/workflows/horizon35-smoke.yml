# Horizon 35: cryptographic suite policy (stdlib)
name: horizon35-smoke

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run Horizon 35 --verify
        run: python scripts/horizon35_crypto_suite_smoke.py --verify
      - name: Check artifact
        run: |
          python -c "import json, pathlib; p=pathlib.Path('.tmp/horizon35-crypto-suite/run.json'); d=json.loads(p.read_text()); assert d.get('ok') and d.get('horizon')==35; assert d['schema']=='horizon35_crypto_suite_run/1.0'; print('ok')"
