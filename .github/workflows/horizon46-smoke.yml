# Horizon 46: latency p99 budget (stdlib)
name: horizon46-smoke

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run Horizon 46 --verify
        run: python scripts/horizon46_latency_p99_smoke.py --verify
      - name: Check artifact
        run: |
          python -c "import json, pathlib; p=pathlib.Path('.tmp/horizon46-latency-p99/run.json'); d=json.loads(p.read_text()); assert d.get('ok') and d.get('horizon')==46; assert d['schema']=='horizon46_latency_p99_run/1.0'; print('ok')"
