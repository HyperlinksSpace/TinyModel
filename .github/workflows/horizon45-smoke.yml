# Horizon 45: payload max-bytes ingress gate (stdlib)
name: horizon45-smoke

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run Horizon 45 --verify
        run: python scripts/horizon45_payload_size_smoke.py --verify
      - name: Check artifact
        run: |
          python -c "import json, pathlib; p=pathlib.Path('.tmp/horizon45-payload-size/run.json'); d=json.loads(p.read_text()); assert d.get('ok') and d.get('horizon')==45; assert d['schema']=='horizon45_payload_size_run/1.0'; print('ok')"
