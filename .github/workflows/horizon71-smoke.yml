# Horizon 71: payment overdue grace window (stdlib)
name: horizon71-smoke

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run Horizon 71 --verify
        run: python scripts/horizon71_payment_grace_smoke.py --verify
      - name: Check artifact
        run: |
          python -c "import json, pathlib; p=pathlib.Path('.tmp/horizon71-payment-grace/run.json'); d=json.loads(p.read_text()); assert d.get('ok') and d.get('horizon')==71; assert d['schema']=='horizon71_payment_grace_run/1.0'; print('ok')"
