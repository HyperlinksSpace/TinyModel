# Horizon 36: maintenance freeze windows (stdlib)
name: horizon36-smoke

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run Horizon 36 --verify
        run: python scripts/horizon36_maintenance_freeze_smoke.py --verify
      - name: Check artifact
        run: |
          python -c "import json, pathlib; p=pathlib.Path('.tmp/horizon36-maintenance-freeze/run.json'); d=json.loads(p.read_text()); assert d.get('ok') and d.get('horizon')==36; assert d['schema']=='horizon36_maintenance_freeze_run/1.0'; print('ok')"
