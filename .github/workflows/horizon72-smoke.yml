# Horizon 72: P1 ticket backlog ceiling (stdlib)
name: horizon72-smoke

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run Horizon 72 --verify
        run: python scripts/horizon72_ticket_backlog_smoke.py --verify
      - name: Check artifact
        run: |
          python -c "import json, pathlib; p=pathlib.Path('.tmp/horizon72-ticket-backlog/run.json'); d=json.loads(p.read_text()); assert d.get('ok') and d.get('horizon')==72; assert d['schema']=='horizon72_ticket_backlog_run/1.0'; print('ok')"
