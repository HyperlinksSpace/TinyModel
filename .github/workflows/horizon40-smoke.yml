# Horizon 40: composite policy AND (stdlib)
name: horizon40-smoke

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run Horizon 40 --verify
        run: python scripts/horizon40_policy_and_smoke.py --verify
      - name: Check artifact
        run: |
          python -c "import json, pathlib; p=pathlib.Path('.tmp/horizon40-policy-and/run.json'); d=json.loads(p.read_text()); assert d.get('ok') and d.get('horizon')==40; assert d['schema']=='horizon40_policy_and_run/1.0'; print('ok')"
