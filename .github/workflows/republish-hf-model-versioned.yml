name: Republish versioned model to Hugging Face (same repo URL)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g. 1, 2, 3) — must match existing TinyModel{version} on the Hub"
        required: true
        default: "1"
      namespace:
        description: "Hugging Face namespace (user or org)"
        required: true
        default: "HyperlinksSpace"

jobs:
  republish-model:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install --upgrade huggingface_hub

      - name: Download current Hub snapshot
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import snapshot_download

          token = os.environ.get("HF_TOKEN")
          if not token:
              raise SystemExit("Missing HF_TOKEN secret.")

          namespace = "${{ github.event.inputs.namespace }}".strip()
          version = "${{ github.event.inputs.version }}".strip()
          name = f"TinyModel{version}"
          repo_id = f"{namespace}/{name}"
          local_dir = f".tmp/{name}"

          snapshot_download(
              repo_id=repo_id,
              repo_type="model",
              local_dir=local_dir,
              token=token,
          )
          print(f"Downloaded {repo_id} -> {local_dir}")
          PY

      - name: Regenerate model card from current repo template
        run: |
          python scripts/regenerate_tinymodel_model_card.py \
            --artifact-dir ".tmp/TinyModel${{ github.event.inputs.version }}"

      - name: Upload folder to same Hub repo (updates in place)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python scripts/publish_hf_artifact.py \
            --namespace "${{ github.event.inputs.namespace }}" \
            --name "TinyModel${{ github.event.inputs.version }}" \
            --repo-type model \
            --source-dir ".tmp/TinyModel${{ github.event.inputs.version }}"
