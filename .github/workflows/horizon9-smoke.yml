# Horizon 9: declarative policy matrix (stdlib)
name: horizon9-smoke

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Unit tests (stdlib, tests/)
        uses: ./.github/actions/stdlib-unittest
      - name: Run Horizon 9 --verify
        run: python scripts/horizon9_policy_smoke.py --verify
      - name: Check artifact
        run: |
          python -c "import json, pathlib; p=pathlib.Path('.tmp/horizon9-policy/run.json'); d=json.loads(p.read_text()); assert d.get('ok') and d.get('horizon')==9; assert d['schema']=='horizon9_policy_run/1.0'; print('ok')"
