# Phase 3: tiny train (CPU) + ONNX export + parity + benchmark. No large Hub downloads in extra cache beyond one smoke train.

name: Phase 3 smoke (ONNX + bench)

on:
  pull_request:
  workflow_dispatch:

jobs:
  phase3:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      PYTHONIOENCODING: utf-8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Unit tests (eval_report_routing, stdlib)
        uses: ./.github/actions/stdlib-unittest

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch transformers datasets tokenizers
          python -m pip install -r optional-requirements-phase3.txt

      - name: Train tiny smoke checkpoint
        run: |
          python scripts/train_tinymodel1_classifier.py \
            --output-dir .tmp/phase3-smoke \
            --max-train-samples 64 \
            --max-eval-samples 32 \
            --epochs 1 \
            --batch-size 8 \
            --seed 42

      - name: Horizon 1 route-to-RAG glue (verify)
        run: |
          python scripts/horizon1_route_then_retrieve.py --verify --model .tmp/phase3-smoke

      - name: Phase 2 routing JSON (routing_policy --from-checkpoint)
        run: |
          python scripts/routing_policy.py --from-checkpoint .tmp/phase3-smoke

      - name: Export ONNX
        run: |
          python scripts/phase3_export_onnx.py --model .tmp/phase3-smoke

      - name: Parity (PyTorch vs ONNX)
        run: |
          python scripts/phase3_onnx_parity.py --model .tmp/phase3-smoke

      - name: Benchmark (write report)
        run: |
          python scripts/phase3_benchmark.py --model .tmp/phase3-smoke --repeats 15 --warmup 2

      - name: Verify reports
        run: |
          test -f artifacts/phase3/reports/benchmark_phase3-smoke.json
          test -f artifacts/phase3/reports/benchmark_phase3-smoke.md
