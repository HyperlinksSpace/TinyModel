# Horizon 49: pinned artifact SHA-256 gate (stdlib)
name: horizon49-smoke

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run Horizon 49 --verify
        run: python scripts/horizon49_digest_pin_smoke.py --verify
      - name: Check artifact
        run: |
          python -c "import json, pathlib; p=pathlib.Path('.tmp/horizon49-digest-pin/run.json'); d=json.loads(p.read_text()); assert d.get('ok') and d.get('horizon')==49; assert d['schema']=='horizon49_digest_pin_run/1.0'; print('ok')"
