# Horizon 12: SHA-256 manifest of pinned texts (stdlib)
name: horizon12-smoke

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run Horizon 12 --verify
        run: python scripts/horizon12_provenance_smoke.py --verify
      - name: Check artifact
        run: |
          python -c "import json, pathlib; p=pathlib.Path('.tmp/horizon12-provenance/run.json'); d=json.loads(p.read_text()); assert d.get('ok') and d.get('horizon')==12; assert d['schema']=='horizon12_provenance_run/1.0'; assert len(d['pinned_files'])>=1; print('ok')"
