# Smoke: download tiny gpt2 and run one greedy generation (Horizon 2 verify path)
name: horizon2-smoke

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Unit tests (stdlib, tests/)
        uses: ./.github/actions/stdlib-unittest
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
          python -m pip install -r optional-requirements-horizon2.txt
      - name: Run Horizon 2 --verify
        env:
          HF_HUB_ENABLE_HF_TRANSFER: 1
        run: |
          python scripts/horizon2_generative.py --verify
      - name: Check artifact shape
        run: |
          python -c "import json, pathlib; p=pathlib.Path('.tmp/horizon2-verify/horizon2_run.json'); d=json.loads(p.read_text()); assert d['horizon']==2 and d['samples'][0]['output']; print('ok')"
