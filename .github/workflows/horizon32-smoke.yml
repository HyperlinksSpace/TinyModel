# Horizon 32: consumer lag budget (stdlib)
name: horizon32-smoke

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run Horizon 32 --verify
        run: python scripts/horizon32_consumer_lag_smoke.py --verify
      - name: Check artifact
        run: |
          python -c "import json, pathlib; p=pathlib.Path('.tmp/horizon32-consumer-lag/run.json'); d=json.loads(p.read_text()); assert d.get('ok') and d.get('horizon')==32; assert d['schema']=='horizon32_consumer_lag_run/1.0'; print('ok')"
