# Horizon 33: purpose limitation matrix (stdlib)
name: horizon33-smoke

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run Horizon 33 --verify
        run: python scripts/horizon33_purpose_matrix_smoke.py --verify
      - name: Check artifact
        run: |
          python -c "import json, pathlib; p=pathlib.Path('.tmp/horizon33-purpose-matrix/run.json'); d=json.loads(p.read_text()); assert d.get('ok') and d.get('horizon')==33; assert d['schema']=='horizon33_purpose_matrix_run/1.0'; print('ok')"
