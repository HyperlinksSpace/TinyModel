# Shared by Phase 1/3, Horizon 2/3/4/6/7/8/9 smokes, and deploy-hf-space-versioned: fast stdlib tests before pip / --verify.
name: Stdlib unit tests
description: Run unittest discover on tests/ (no torch).
runs:
  using: composite
  steps:
    - name: unittest discover
      run: python -m unittest discover -s tests -p "test_*.py" -v
      shell: bash
